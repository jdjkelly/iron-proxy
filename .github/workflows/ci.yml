name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.26"

      - name: Run tests
        run: go test -race -count=1 ./...

  vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.26"

      - name: go vet
        run: go vet ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.26"

      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          install-mode: binary

  tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.26"

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
