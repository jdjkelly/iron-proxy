name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ironsh/iron-proxy-action@v0.1.3
        with:
          egress-rules: egress-rules.yaml

      - uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.26"

      - name: Run tests
        run: go test -v -race -count=1 ./...

      - uses: ironsh/iron-proxy-action/summary@v0.1.3
        if: always()

  vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ironsh/iron-proxy-action@v0.1.3
        with:
          egress-rules: egress-rules.yaml

      - uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.26"

      - name: go vet
        run: go vet ./...

      - uses: ironsh/iron-proxy-action/summary@v0.1.3
        if: always()

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ironsh/iron-proxy-action@v0.1.3
        with:
          egress-rules: egress-rules.yaml

      - uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.26"

      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          install-mode: binary

      - uses: ironsh/iron-proxy-action/summary@v0.1.3
        if: always()

  tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ironsh/iron-proxy-action@v0.1.3
        with:
          egress-rules: egress-rules.yaml

      - uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.26"

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - uses: ironsh/iron-proxy-action/summary@v0.1.3
        if: always()
