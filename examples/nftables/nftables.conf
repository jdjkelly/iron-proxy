#!/usr/sbin/nft -f

# Enforce that all egress traffic from the sandbox goes through iron-proxy.
# Loaded by an init container that shares the workload's network namespace.
# The workload container must NOT have CAP_NET_ADMIN.

table ip iron {
  chain output {
    type filter hook output priority 0; policy drop;

    # allow loopback
    oif lo accept

    # allow traffic to the proxy itself (DNS + HTTP/HTTPS)
    ip daddr 172.20.0.2 tcp dport { 80, 443 } accept
    ip daddr 172.20.0.2 udp dport 53 accept

    # allow established/related (return traffic)
    ct state established,related accept

    # log and drop everything else
    log prefix "iron-proxy-drop: " drop
  }
}
