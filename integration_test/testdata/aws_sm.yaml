dns:
  proxy_ip: "127.0.0.1"
  listen: "127.0.0.1:0"

proxy:
  http_listen: "127.0.0.1:0"
  https_listen: "127.0.0.1:0"
  max_request_body_bytes: 1048576

tls:
  ca_cert: tmp/ca.crt
  ca_key: tmp/ca.key

transforms:
  - name: allowlist
    config:
      domains:
        - "127.0.0.1"

  - name: secrets
    config:
      secrets:
        - source:
            type: aws_sm
            secret_id: "arn:aws:secretsmanager:us-west-1:673698305641:secret:example-raw-secret-dgDlkC"
            region: "us-west-1"
          proxy_value: "proxy-raw-secret"
          match_headers: ["X-Raw-Secret"]
          rules:
            - host: "127.0.0.1"

        - source:
            type: aws_sm
            secret_id: "arn:aws:secretsmanager:us-west-1:673698305641:secret:example-kv-secret-ll3gIc"
            region: "us-west-1"
            json_key: "example-key"
          proxy_value: "proxy-kv-secret"
          match_headers: ["X-KV-Secret"]
          rules:
            - host: "127.0.0.1"

metrics:
  listen: "127.0.0.1:0"

log:
  level: info
