dns:
  proxy_ip: "127.0.0.1"
  listen: "127.0.0.1:0"

proxy:
  http_listen: "127.0.0.1:0"
  https_listen: "127.0.0.1:0"
  max_request_body_bytes: 1048576

tls:
  ca_cert: tmp/ca.crt
  ca_key: tmp/ca.key

transforms:
  - name: allowlist
    config:
      domains:
        - "127.0.0.1"

  - name: secrets
    config:
      secrets:
        - source:
            type: env
            var: TEST_SECRET
          proxy_value: "proxy-token"
          match_headers: ["Authorization"]
          rules:
            - host: "127.0.0.1"

  - name: grpc
    config:
      name: grpc-step-1
      target: {{.GRPCAddr1}}
      send_request_body: true
      send_response_body: true

  - name: grpc
    config:
      name: grpc-step-2
      target: {{.GRPCAddr2}}
      send_request_body: true
      send_response_body: true

metrics:
  listen: "127.0.0.1:0"

log:
  level: info
