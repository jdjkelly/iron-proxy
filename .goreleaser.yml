version: 2

builds:
  - main: ./cmd/iron-proxy
    binary: iron-proxy
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: ["tar.gz"]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

dockers_v2:
  - images:
      - "ironsh/iron-proxy"
    tags:
      - "{{ .Version }}"
      - "latest"
    dockerfile: Dockerfile.release

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
